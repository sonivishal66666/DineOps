version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: brewhub_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword123
      POSTGRES_DB: brewhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d brewhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brewhub_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgrespassword123@db:5432/brewhub?schema=public
      JWT_SECRET: brewhub_jwt_secret_key_2026_super_secure
      SUPABASE_URL: https://your-supabase-project.supabase.co
      SUPABASE_KEY: your-supabase-anon-key
      CASHFREE_APP_ID: your_cashfree_app_id
      CASHFREE_SECRET_KEY: your_cashfree_secret_key
      CASHFREE_ENV: TEST
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brewhub_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_SUPABASE_URL: https://your-supabase-project.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: your-supabase-anon-key
    depends_on:
      - backend

volumes:
  postgres_data:
