<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE5A3" />
      <stop offset="40%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#6A4E0B" />
    </linearGradient>
  </defs>

  <!-- Stylized D Outer Shape -->
  <path d="M 180 100 
           L 320 100 
           C 420 100, 460 180, 460 256 
           C 460 332, 420 412, 320 412 
           L 240 412 
           C 200 412, 170 380, 170 330 
           C 170 280, 200 240, 240 240
           L 240 240" 
        stroke="url(#gold-grad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Left accent swoosh/leaf at bottom-left corner -->
  <path d="M 170 240 
           C 170 320, 210 412, 256 412 
           C 205 412, 170 365, 170 300 Z" 
        fill="url(#gold-grad)" />

  <!-- Fork (Center-Left) -->
  <g transform="translate(235, 160)">
    <!-- Fork stem -->
    <path d="M 22 130 L 22 65" stroke="url(#gold-grad)" stroke-width="18" stroke-linecap="round" />
    <!-- Fork base curve -->
    <path d="M 0 35 C 0 60, 44 60, 44 35" stroke="url(#gold-grad)" stroke-width="14" fill="none" stroke-linecap="round" />
    <!-- Tines -->
    <path d="M 0 5 L 0 35 M 14 5 L 14 35 M 30 5 L 30 35 M 44 5 L 44 35" stroke="url(#gold-grad)" stroke-width="9" stroke-linecap="round" />
  </g>

  <!-- Knife (Center-Right) -->
  <g transform="translate(325, 160)">
    <!-- Knife handle -->
    <path d="M 15 130 L 15 65" stroke="url(#gold-grad)" stroke-width="18" stroke-linecap="round" />
    <!-- Knife blade -->
    <path d="M 15 65 C 15 65, 36 55, 36 32 C 36 10, 15 0, 15 0 L 15 65 Z" fill="url(#gold-grad)" />
  </g>
</svg>
